spring:
  application:
    name: clouddent-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:clouddent}
    username: ${DB_USER:clouddent}
    password: ${DB_PASSWORD:clouddent123}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:CloudDentSecretKeyParaDesarrolloMVP2024Minimo32Chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:80,http://localhost}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.clouddent: INFO
